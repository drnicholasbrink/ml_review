{% extends "base.html" %}
{% block title %}Setup · ML Review{% endblock %}
{% block content %}
<h1>{{ manifest.name }} · Setup</h1>
<p class="page-intro">Set the query and criteria that anchor this review. Both are required before continuing to PubMed.</p>
{% if error %}<p class="notice" role="alert">{{ error }}</p>{% endif %}
<form method="post" class="card stack">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label>PubMed search strategy
    <textarea name="search_strategy" rows="8" maxlength="10000" required>{{ search_strategy }}</textarea>
    <small>Maximum 10,000 characters.</small>
  </label>
  <label>Inclusion/exclusion criteria
    <textarea name="inclusion_criteria" rows="10" maxlength="50000" required>{{ criteria }}</textarea>
    <small>Maximum 50,000 characters. Review these criteria before screening.</small>
  </label>
  <div class="form-actions"><button type="submit">Save and continue to PubMed</button></div>
</form>
{% endblock %}
