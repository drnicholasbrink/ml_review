services:
  ml-review:
    build: .
    ports:
      - "127.0.0.1:${ML_REVIEW_PORT:-5055}:5000"
    environment:
      ML_REVIEW_RUNTIME_DIR: /app/runtime
      ML_REVIEW_SECRET_KEY: ${ML_REVIEW_SECRET_KEY:?Run python scripts/export_secrets_to_env.py or set ML_REVIEW_SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PUBMED_API_KEY: ${PUBMED_API_KEY:-}
      NCBI_EMAIL: ${NCBI_EMAIL:-}
    volumes:
      - ./runtime:/app/runtime
